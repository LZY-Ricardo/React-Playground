<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- React 渐变蓝 -->
    <linearGradient id="reactGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61DAFB"/>
      <stop offset="100%" style="stop-color:#21A0C4"/>
    </linearGradient>

    <!-- 代码高亮粉 -->
    <linearGradient id="codePink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#C8456E"/>
    </linearGradient>

    <!-- 代码高亮黄 -->
    <linearGradient id="codeYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D"/>
      <stop offset="100%" style="stop-color:#F0B429"/>
    </linearGradient>
  </defs>

  <!-- 背景圆形（深色底） -->
  <circle cx="64" cy="64" r="60" fill="#0D1117"/>

  <!-- React 原子轨道 -->
  <!-- 椭圆轨道 1 -->
  <ellipse cx="64" cy="64" rx="50" ry="18" fill="none" stroke="url(#reactGradient)" stroke-width="3" transform="rotate(0 64 64)" opacity="0.9"/>
  <!-- 椭圆轨道 2 -->
  <ellipse cx="64" cy="64" rx="50" ry="18" fill="none" stroke="url(#reactGradient)" stroke-width="3" transform="rotate(60 64 64)" opacity="0.9"/>
  <!-- 椭圆轨道 3 -->
  <ellipse cx="64" cy="64" rx="50" ry="18" fill="none" stroke="url(#reactGradient)" stroke-width="3" transform="rotate(120 64 64)" opacity="0.9"/>

  <!-- 代码括号 { } 作为装饰 -->
  <text x="20" y="95" font-family="monospace" font-size="28" font-weight="bold" fill="url(#codePink)" opacity="0.8">{</text>
  <text x="92" y="95" font-family="monospace" font-size="28" font-weight="bold" fill="url(#codeYellow)" opacity="0.8">}</text>

  <!-- 中心原子核 -->
  <circle cx="64" cy="64" r="12" fill="url(#reactGradient)">
    <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- 核心内的代码符号 </> -->
  <text x="64" y="70" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#0D1117">&lt;/&gt;</text>
</svg>
